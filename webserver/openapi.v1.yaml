info:
  description: ''
  title: Math3d API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/auth/users/activation/:
    post:
      operationId: authentication_api_activate
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationSchema'
        required: true
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
      security:
      - StaffSessionAuth: []
      summary: Activate
  /v1/auth/users/me/:
    get:
      operationId: authentication_api_get_me
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSchema'
          description: OK
      security:
      - SessionAuth: []
      summary: Get Me
    patch:
      operationId: authentication_api_patch_me
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateSchema'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSchema'
          description: OK
      security:
      - SessionAuth: []
      summary: Patch Me
  /v1/auth/users/me/delete/:
    post:
      operationId: authentication_api_delete_me
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountSchema'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountError'
          description: Bad Request
      security:
      - SessionAuth: []
      summary: Delete Me
  /v1/legacy_scenes/:
    post:
      operationId: scenes_api_create_legacy
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacySceneInSchema'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacySceneOutSchema'
          description: Created
      summary: Create Legacy
  /v1/legacy_scenes/{key}/:
    get:
      operationId: scenes_api_get_legacy
      parameters:
      - in: path
        name: key
        required: true
        schema:
          title: Key
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacySceneOutSchema'
          description: OK
      summary: Get Legacy
  /v1/scenes/:
    get:
      operationId: scenes_api_list_scenes
      parameters:
      - in: query
        name: title
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      - in: query
        name: archived
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Archived
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMiniSceneSchema'
          description: OK
      summary: List Scenes
    post:
      operationId: scenes_api_create_scene
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneCreateSchema'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneSchema'
          description: Created
      summary: Create Scene
  /v1/scenes/me/:
    get:
      operationId: scenes_api_my_scenes
      parameters:
      - in: query
        name: title
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      - in: query
        name: archived
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Archived
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMiniSceneSchema'
          description: OK
      security:
      - SessionAuth: []
      summary: My Scenes
  /v1/scenes/{key}/:
    delete:
      operationId: scenes_api_delete_scene
      parameters:
      - in: path
        name: key
        required: true
        schema:
          title: Key
          type: string
      responses:
        '204':
          description: No Content
      security:
      - SessionAuth: []
      summary: Delete Scene
    get:
      operationId: scenes_api_get_scene
      parameters:
      - in: path
        name: key
        required: true
        schema:
          title: Key
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneSchema'
          description: OK
      summary: Get Scene
    patch:
      operationId: scenes_api_update_scene
      parameters:
      - in: path
        name: key
        required: true
        schema:
          title: Key
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenePatchSchema'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneSchema'
          description: OK
      security:
      - SessionAuth: []
      summary: Update Scene
servers: []
