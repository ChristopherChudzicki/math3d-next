components:
  requestBodies:
    ChangePassword:
      content:
        application/json:
          schema:
            properties:
              current_password:
                $ref: '#/components/schemas/Password'
              new_password:
                description: 'The current password.

                  '
                type: string
            required:
            - new_password
            type: object
    Login:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Login'
      description: Login.
      required: true
    RequestPassword:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RequestPassword'
      description: Request password.
      required: true
    ResetPassword:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResetPassword'
    Signup:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Signup'
      description: Signup
      required: true
    VerifyEmail:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VerifyEmail'
  responses:
    Authenticated:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticatedResponse'
      description: The user is authenticated.
    AuthenticatedByPassword:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticatedResponse'
      description: 'Authenticated by password.

        '
    Authentication:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticationResponse'
      description: Not authenticated.
    Error:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: An input error occurred.
    StatusOK:
      content:
        application/json:
          schema:
            properties:
              status:
                $ref: '#/components/schemas/StatusOK'
            required:
            - status
            type: object
      description: 'A success response.

        '
    Unauthenticated:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticationResponse'
      description: 'There is no authenticated session.

        '
  schemas:
    Authenticated:
      properties:
        methods:
          description: 'A list of methods used to authenticate.

            '
          items:
            $ref: '#/components/schemas/AuthenticationMethod'
          type: array
        user:
          $ref: '#/components/schemas/User'
      required:
      - user
      - methods
      type: object
    AuthenticatedResponse:
      properties:
        data:
          $ref: '#/components/schemas/Authenticated'
        meta:
          $ref: '#/components/schemas/AuthenticationMeta'
        status:
          $ref: '#/components/schemas/StatusOK'
      required:
      - status
      - data
      - meta
      type: object
    AuthenticationMeta:
      allOf:
      - $ref: '#/components/schemas/BaseAuthenticationMeta'
      - description: 'Metadata available in an authentication related response.

          '
        properties:
          is_authenticated:
            type: boolean
        required:
        - is_authenticated
        type: object
    AuthenticationMethod:
      oneOf:
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          email:
            $ref: '#/components/schemas/Email'
          method:
            enum:
            - password
            type: string
          username:
            $ref: '#/components/schemas/Username'
        required:
        - method
        - at
        title: 'Authenticated by username/email login

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          email:
            $ref: '#/components/schemas/Email'
          method:
            enum:
            - password_reset
            type: string
        required:
        - at
        - email
        - method
        title: 'Authenticated after password reset

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          email:
            $ref: '#/components/schemas/Email'
          method:
            enum:
            - code
            type: string
        required:
        - at
        - email
        - method
        title: 'Authenticated by confirming a code sent by email.

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          method:
            enum:
            - code
            type: string
          phone:
            $ref: '#/components/schemas/Phone'
        required:
        - at
        - method
        - phone
        title: 'Authenticated by confirming a code sent by phone.

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          method:
            enum:
            - password
            type: string
          reauthenticated:
            enum:
            - true
            type: boolean
        required:
        - method
        - reauthenticated
        - at
        title: 'Reauthenticated by password

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          method:
            enum:
            - socialaccount
            type: string
          provider:
            $ref: '#/components/schemas/ProviderID'
          uid:
            $ref: '#/components/schemas/ProviderAccountID'
        required:
        - method
        - reauthenticated
        - at
        - provider
        - uid
        title: 'Authenticated by third-party provider

          '
        type: object
      - properties:
          at:
            $ref: '#/components/schemas/Timestamp'
          method:
            enum:
            - mfa
            type: string
          reauthenticated:
            type: boolean
          type:
            $ref: '#/components/schemas/AuthenticatorType'
        required:
        - method
        - at
        - type
        title: '(Re)authenticated by 2FA

          '
        type: object
    AuthenticationResponse:
      description: 'An authentication related response.

        '
      properties:
        data:
          properties:
            flows:
              items:
                $ref: '#/components/schemas/Flow'
              type: array
          required:
          - flows
          type: object
        meta:
          $ref: '#/components/schemas/AuthenticationMeta'
        status:
          enum:
          - 401
          type: integer
      required:
      - status
      - data
      - meta
      type: object
    AuthenticatorType:
      description: 'The type of authenticator.

        '
      enum:
      - recovery_codes
      - totp
      - webauthn
      type: string
    BaseAuthenticationMeta:
      properties:
        access_token:
          description: 'The access token (`app` clients only).

            '
          type: string
        session_token:
          description: 'The session token (`app` clients only).

            '
          type: string
      type: object
    BaseSignup:
      properties:
        email:
          $ref: '#/components/schemas/Email'
        public_nickname:
          maxLength: 64
          type: string
      required:
      - email
      type: object
    ConflictResponse:
      properties:
        status:
          enum:
          - 409
          type: integer
      required:
      - status
      type: object
    Email:
      description: 'The email address.

        '
      type: string
    ErrorResponse:
      properties:
        errors:
          items:
            properties:
              code:
                description: 'An error code.

                  '
                type: string
              message:
                description: 'A human readable error message.

                  '
                type: string
              param:
                description: 'The name of the input parameter that was incorrect.

                  '
                type: string
            required:
            - code
            - message
            type: object
          type: array
        status:
          enum:
          - 400
          type: integer
      type: object
    Flow:
      properties:
        id:
          enum:
          - login
          - login_by_code
          - mfa_authenticate
          - mfa_reauthenticate
          - provider_redirect
          - provider_signup
          - provider_token
          - reauthenticate
          - signup
          - verify_email
          - verify_phone
          type: string
        is_pending:
          enum:
          - true
          type: boolean
        provider:
          $ref: '#/components/schemas/Provider'
        types:
          description: Matches `settings.MFA_SUPPORTED_TYPES`.
          items:
            $ref: '#/components/schemas/AuthenticatorType'
          type: array
      required:
      - id
      type: object
    ForbiddenResponse:
      properties:
        status:
          enum:
          - 403
          type: integer
      required:
      - status
      type: object
    Login:
      allOf:
      - properties:
          password:
            $ref: '#/components/schemas/Password'
        required:
        - password
        type: object
      - anyOf:
        - properties:
            username:
              $ref: '#/components/schemas/Username'
          required:
          - username
          title: Login by username
        - properties:
            email:
              $ref: '#/components/schemas/Email'
          required:
          - email
          title: Login by email
        - properties:
            phone:
              $ref: '#/components/schemas/Phone'
          required:
          - phone
          title: Login by phone
    Password:
      description: 'The password.

        '
      type: string
    Phone:
      description: 'The phone number.

        '
      type: string
    Provider:
      properties:
        client_id:
          description: 'The client ID (in case of OAuth2 or OpenID Connect based providers)

            '
          type: string
        flows:
          description: 'The authentication flows the provider integration supports.

            '
          items:
            enum:
            - provider_redirect
            - provider_token
            type: string
          type: array
        id:
          description: 'The provider ID.

            '
          type: string
        name:
          description: 'The name of the provider.

            '
          type: string
        openid_configuration_url:
          description: 'The OIDC discovery or well-known URL (in case of OAuth2 or OpenID Connect based providers)

            '
          type: string
      required:
      - id
      - name
      - flows
      type: object
    ProviderAccountID:
      description: 'The provider specific account ID.

        '
      type: string
    ProviderID:
      description: 'The provider ID.

        '
      type: string
    RequestPassword:
      properties:
        email:
          $ref: '#/components/schemas/Email'
      required:
      - email
      type: object
    ResetPassword:
      properties:
        key:
          description: The password reset key
          type: string
        password:
          $ref: '#/components/schemas/Password'
      required:
      - key
      - password
      type: object
    Signup:
      allOf:
      - $ref: '#/components/schemas/BaseSignup'
      - properties:
          password:
            $ref: '#/components/schemas/Password'
        required:
        - password
        type: object
    StatusOK:
      enum:
      - 200
      type: integer
    Timestamp:
      description: 'An epoch based timestamp (trivial to parse using: `new Date(value)*1000`)

        '
      type: number
    User:
      properties:
        display:
          description: The display name for the user.
          type: string
        email:
          description: The email address.
          type: string
        has_usable_password:
          description: Whether or not the account has a password set.
          type: boolean
        id:
          description: The user ID.
          type: integer
      required:
      - display
      - has_usable_password
      type: object
    Username:
      description: 'The username.

        '
      type: string
    VerifyEmail:
      properties:
        key:
          description: The email verification key
          type: string
      required:
      - key
      type: object
info:
  description: Trimmed django-allauth headless browser API. Vendored via `manage.py dump_openapi_allauth`.
  title: 'django-allauth: Headless API'
  version: '1'
openapi: 3.0.3
paths:
  /_allauth/browser/v1/account/password/change:
    post:
      description: 'In order to change the password of an account, the current and new

        password must be provider.  However, accounts that were created by

        signing up using a third-party provider do not have a password set. In

        that case, the current password is not required.

        '
      operationId: changePassword
      requestBody:
        $ref: '#/components/requestBodies/ChangePassword'
      responses:
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Authentication'
      summary: Change password
      tags:
      - allauth
  /_allauth/browser/v1/auth/email/verify:
    post:
      description: 'Complete the email verification process. Depending on the configuration,

        email addresses are either verified by opening a link that is sent to

        their email address, or, by inputting a code that is sent. On the API,

        both cases are handled identically. Meaning, the required key is either

        the one from the link, or, the code itself.


        Note that a status code of 401 does not imply failure. It indicates that

        the email verification was successful, yet, the user is still not signed

        in. For example, in case `ACCOUNT_LOGIN_ON_EMAIL_CONFIRMATION` is set to

        `False`, a 401 is returned when verifying as part of login/signup.

        '
      operationId: verifyEmail
      requestBody:
        $ref: '#/components/requestBodies/VerifyEmail'
      responses:
        '200':
          $ref: '#/components/responses/Authenticated'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 'An input error occurred.

            '
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'
          description: 'Conflict. The email verification (by code) flow is not pending.

            '
      summary: Verify an email
      tags:
      - allauth
  /_allauth/browser/v1/auth/login:
    post:
      description: 'Login using a username-password or email-password combination.

        '
      operationId: login
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        '200':
          $ref: '#/components/responses/AuthenticatedByPassword'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: An input error occurred.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
          description: 'Not authenticated.

            '
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'
          description: 'Conflict. For example, when logging in when a user is already logged in.

            '
      summary: Login
      tags:
      - allauth
  /_allauth/browser/v1/auth/password/request:
    post:
      description: 'Initiates the password reset procedure. Depending on whether or not

        `ACCOUNT_PASSWORD_RESET_BY_CODE_ENABLED` is `True`, the procedure is

        either stateless or stateful.


        In case codes are used, it is stateful, and a new

        `password_reset_by_code` flow is started. In this case, on a successful

        password reset request, you will receive a 401 indicating the pending

        status of this flow.


        In case password reset is configured to use (stateless) links, you will

        receive a 200 on a successful password reset request.

        '
      operationId: requestPassword
      requestBody:
        $ref: '#/components/requestBodies/RequestPassword'
      responses:
        '200':
          $ref: '#/components/responses/StatusOK'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 'An input error occurred.

            '
        '401':
          $ref: '#/components/responses/Authentication'
      summary: Request password
      tags:
      - allauth
  /_allauth/browser/v1/auth/password/reset:
    post:
      description: 'Perform the password reset, by handing over the password reset key and

        the new password. After successfully completing the password reset, the

        user is either logged in (in case `ACCOUNT_LOGIN_ON_PASSWORD_RESET` is

        `True`), or, the user will need to proceed to the login page.  In case

        of the former, a `200` status code is returned, in case of the latter a

        401.

        '
      operationId: resetPassword
      requestBody:
        $ref: '#/components/requestBodies/ResetPassword'
      responses:
        '200':
          $ref: '#/components/responses/AuthenticatedByPassword'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: An input error occurred.
        '401':
          $ref: '#/components/responses/Authentication'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'
          description: 'Conflict. There is no password reset (by code) flow pending.

            '
      summary: Reset password
      tags:
      - allauth
  /_allauth/browser/v1/auth/session:
    delete:
      description: 'Logs out the user from the current session.

        '
      operationId: logout
      responses:
        '401':
          $ref: '#/components/responses/Unauthenticated'
      summary: Logout
      tags:
      - allauth
  /_allauth/browser/v1/auth/signup:
    post:
      description: 'Whether or not `username`, `email`, `phone` or combination of those are

        required depends on the configuration of django-allauth. Additionally,

        if a custom signup form is used there may be other custom properties

        required.

        '
      operationId: signup
      requestBody:
        $ref: '#/components/requestBodies/Signup'
      responses:
        '200':
          $ref: '#/components/responses/AuthenticatedByPassword'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 'An input error occurred.

            '
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
          description: 'Not authenticated.

            '
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
          description: 'Forbidden. For example, when signup is closed.

            '
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'
          description: 'Conflict. For example, when signing up while user is logged in.

            '
      summary: Signup
      tags:
      - allauth
