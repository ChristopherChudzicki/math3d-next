openapi: 3.0.3
info:
  title: Math3d API
  version: 0.0.1
  description: Math3d API
paths:
  /v0/auth/users/activation/:
    post:
      operationId: auth_users_activation_create
      description: Admin-only endpoint to activate a user and mark their email as
        verified.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActivateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ActivateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /v0/auth/users/me/:
    get:
      operationId: auth_users_me_retrieve
      description: GET, PATCH, and DELETE the current user's profile.
      tags:
      - auth
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_users_me_partial_update
      description: GET, PATCH, and DELETE the current user's profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: auth_users_me_destroy
      description: GET, PATCH, and DELETE the current user's profile.
      tags:
      - auth
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /v0/legacy_scenes/:
    get:
      operationId: legacy_scenes_list
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - legacy_scenes
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLegacySceneList'
          description: ''
    post:
      operationId: legacy_scenes_create
      tags:
      - legacy_scenes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacySceneRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LegacySceneRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LegacySceneRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyScene'
          description: ''
  /v0/legacy_scenes/{key}/:
    get:
      operationId: legacy_scenes_retrieve
      parameters:
      - in: path
        name: key
        schema:
          type: string
        required: true
      tags:
      - legacy_scenes
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyScene'
          description: ''
  /v0/scenes/:
    get:
      operationId: scenes_list
      parameters:
      - in: query
        name: archived
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: title
        schema:
          type: string
      tags:
      - scenes
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMiniSceneList'
          description: ''
    post:
      operationId: scenes_create
      tags:
      - scenes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SceneCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SceneCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneCreate'
          description: ''
  /v0/scenes/{key}/:
    get:
      operationId: scenes_retrieve
      parameters:
      - in: path
        name: key
        schema:
          type: string
        required: true
      tags:
      - scenes
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
          description: ''
    patch:
      operationId: scenes_partial_update
      parameters:
      - in: path
        name: key
        schema:
          type: string
        required: true
      tags:
      - scenes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSceneRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSceneRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSceneRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
          description: ''
    delete:
      operationId: scenes_destroy
      parameters:
      - in: path
        name: key
        schema:
          type: string
        required: true
      tags:
      - scenes
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /v0/scenes/me/:
    get:
      operationId: scenes_me_list
      parameters:
      - in: query
        name: archived
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: title
        schema:
          type: string
      tags:
      - scenes
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMiniSceneList'
          description: ''
components:
  schemas:
    ActivateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    LegacyScene:
      type: object
      properties:
        key:
          type: string
          maxLength: 80
        dehydrated: {}
      required:
      - dehydrated
    LegacySceneRequest:
      type: object
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 80
        dehydrated: {}
      required:
      - dehydrated
    MiniScene:
      type: object
      properties:
        title:
          type: string
        key:
          type: string
          maxLength: 80
        author:
          type: integer
          nullable: true
        createdDate:
          type: string
          format: date-time
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
      required:
      - createdDate
      - modifiedDate
    PaginatedLegacySceneList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/LegacyScene'
    PaginatedMiniSceneList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/MiniScene'
    PatchedSceneRequest:
      type: object
      properties:
        items: {}
        itemOrder: {}
        title:
          type: string
        archived:
          type: boolean
    PatchedUserRequest:
      type: object
      properties:
        public_nickname:
          type: string
          minLength: 1
          maxLength: 64
    Scene:
      type: object
      properties:
        items: {}
        itemOrder: {}
        title:
          type: string
        key:
          type: string
          readOnly: true
        author:
          type: integer
          readOnly: true
          nullable: true
        createdDate:
          type: string
          format: date-time
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
        isLegacy:
          type: boolean
          readOnly: true
      required:
      - author
      - createdDate
      - isLegacy
      - itemOrder
      - items
      - key
      - modifiedDate
    SceneCreate:
      type: object
      properties:
        items: {}
        itemOrder: {}
        title:
          type: string
        key:
          type: string
          readOnly: true
        createdDate:
          type: string
          format: date-time
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
        isLegacy:
          type: boolean
          readOnly: true
      required:
      - createdDate
      - isLegacy
      - itemOrder
      - items
      - key
      - modifiedDate
    SceneCreateRequest:
      type: object
      properties:
        items: {}
        itemOrder: {}
        title:
          type: string
        archived:
          type: boolean
      required:
      - itemOrder
      - items
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        public_nickname:
          type: string
          maxLength: 64
      required:
      - email
      - id
      - public_nickname
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
