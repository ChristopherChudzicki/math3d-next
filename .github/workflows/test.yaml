name: CI/ Tests

env:
  CI: True

on:
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    environment: "ci"
    env:
      SKIP_YARN_COREPACK_CHECK: true
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_APP_VERSION: ci
      VITE_LEGACY_APP_BASE_URL: ${{ vars.VITE_LEGACY_APP_BASE_URL }}
      VITE_ISSUE_URL: ${{ vars.VITE_ISSUE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn fmt-check
      - run: yarn workspace app css-types --list-different
      - run: yarn typecheck
      - run: yarn test -- --test-timeout=10000

  webserver-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webserver
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14.6
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Install python dependencies
        run: just setup_python
      - name: Check v1 OpenAPI up-to-date
        run: ./scripts/test/openapi_v1_spec_check.sh
      - name: Typecheck Python
        run: just typecheck
      - name: Test Python
        run: just test

  openapi-generated-client-check:
    # This job checks that the output of openapi-generator-typescript-axios that
    # is checked into version control is up-to-date.
    env:
      SKIP_YARN_COREPACK_CHECK: true # https://github.com/actions/setup-node/issues/531#issuecomment-1819151412
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
      - run: corepack enable
      - name: Setup env variables
        run: cp .env.development .env
      - name: Install dependencies
        run: yarn install --immutable
      - name: Generate Fresh v1 API Client
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-axios
          openapi-file: ./webserver/openapi.v1.yaml
          generator-tag: v7.23.0
          command-args: |
            --output ./packages/api/tmp/generated-v1 \
            --ignore-file-override ./packages/api/.openapi-generator-ignore \
            --additional-properties=useSingleRequestParameter=true,paramNaming=original
      - name: Format freshly generated v1 client
        run: yarn prettier ./packages/api/tmp/generated-v1/**/*.ts --write
      - name: Check VC v1 client is up-to-date
        run: |
          diff ./packages/api/tmp/generated-v1 ./packages/api/src/generated-v1 \
          || { echo "v1 OpenAPI client is out of date. Please regenerate via ./scripts/generate_openapi.sh"; exit 1; }
