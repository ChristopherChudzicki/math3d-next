name: CI/ Tests

env:
  CI: True

on:
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    environment: "ci"
    env:
      SKIP_YARN_COREPACK_CHECK: true
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_APP_VERSION: ci
      VITE_LEGACY_APP_BASE_URL: ${{ vars.VITE_LEGACY_APP_BASE_URL }}
      VITE_ISSUE_URL: ${{ vars.VITE_ISSUE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn fmt-check
      - run: yarn workspace app css-types --list-different
      - run: yarn typecheck
      - run: yarn test -- --test-timeout=10000

  webserver-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webserver
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.5
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Install python dependencies
        run: just setup_python
      - name: Check v1 OpenAPI up-to-date
        run: ./scripts/test/openapi_v1_spec_check.sh
      - name: Check allauth OpenAPI up-to-date
        run: ./scripts/test/openapi_allauth_spec_check.sh
      - name: Typecheck Python
        run: just typecheck
      - name: Test Python
        run: just test

  openapi-generated-client-check:
    # This job checks that the generated clients checked into version control are
    # up-to-date. Both clients are types-only (openapi-typescript) — a single
    # index.ts each, regenerated, prettier-formatted, and diffed directly.
    env:
      SKIP_YARN_COREPACK_CHECK: true # https://github.com/actions/setup-node/issues/531#issuecomment-1819151412
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
      - run: corepack enable
      - name: Setup env variables
        run: cp .env.development .env
      - name: Install dependencies
        run: yarn install --immutable
      - name: Generate Fresh v1 API Client (types-only)
        run: |
          mkdir -p ./packages/api/tmp/generated-v1
          npx openapi-typescript ./webserver/openapi.v1.yaml --default-non-nullable false \
            --output ./packages/api/tmp/generated-v1/index.ts
      - name: Format freshly generated v1 client
        run: yarn prettier ./packages/api/tmp/generated-v1/index.ts --write
      - name: Check VC v1 client is up-to-date
        run: |
          diff ./packages/api/tmp/generated-v1/index.ts ./packages/api/src/generated-v1/index.ts \
          || { echo "v1 OpenAPI client is out of date. Please regenerate via ./scripts/generate_openapi.sh"; exit 1; }
      - name: Generate Fresh allauth API Client (types-only)
        run: |
          mkdir -p ./packages/api/tmp/generated-allauth
          npx openapi-typescript ./webserver/openapi.allauth.yaml --default-non-nullable false \
            --output ./packages/api/tmp/generated-allauth/index.ts
      - name: Format freshly generated allauth client
        run: yarn prettier ./packages/api/tmp/generated-allauth/index.ts --write
      - name: Check VC allauth client is up-to-date
        run: |
          diff ./packages/api/tmp/generated-allauth/index.ts ./packages/api/src/generated-allauth/index.ts \
          || { echo "allauth OpenAPI client is out of date. Please regenerate via ./scripts/generate_openapi.sh"; exit 1; }
