name: CI/ End-to-end Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: True

jobs:
  e2e-tests:
    timeout-minutes: 60
    # Pinned to 24.04 (not 26.04 like the other jobs) because Playwright 1.57
    # can't install browser deps on ubuntu-26.04-x64 yet. The backend under test
    # runs in Docker, so this runner's OS has no Heroku-parity relevance. Bump to
    # ubuntu-26.04 once a Playwright release supports it.
    runs-on: ubuntu-24.04
    environment: "ci"
    env:
      SKIP_YARN_COREPACK_CHECK: true
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_APP_VERSION: ci
      VITE_DISPLAY_AUTH_FLOWS: "true"
      VITE_LEGACY_APP_BASE_URL: ${{ vars.VITE_LEGACY_APP_BASE_URL }}
      VITE_ISSUE_URL: ${{ vars.VITE_ISSUE_URL }}
      TEST_API_URL: ${{ vars.TEST_API_URL }}
      TEST_APP_URL: ${{ vars.TEST_APP_URL }}
      TEST_EMAIL_PROVIDER: ${{ vars.TEST_EMAIL_PROVIDER }}
      TEST_USER_ADMIN_EMAIL: ${{ vars.TEST_USER_ADMIN_EMAIL }}
      TEST_USER_ADMIN_PASSWORD: ${{ vars.TEST_USER_ADMIN_PASSWORD }}
      TEST_USER_STATIC_EMAIL: ${{ vars.TEST_USER_STATIC_EMAIL }}
      TEST_USER_STATIC_PASSWORD: ${{ vars.TEST_USER_STATIC_PASSWORD }}
    steps:
      - name: Add local domain entries to /etc/hosts
        run: |
          APP_HOST=$(echo "$TEST_APP_URL" | sed -E 's|https?://||; s|:[0-9]+$||')
          API_HOST=$(echo "$TEST_API_URL" | sed -E 's|https?://||; s|:[0-9]+$||')
          echo "127.0.0.1 $APP_HOST $API_HOST" | sudo tee -a /etc/hosts
          echo "::1       $APP_HOST $API_HOST" | sudo tee -a /etc/hosts
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"
      - run: corepack enable
      - name: Write env file for docker
        run: |
          echo "APP_BASE_URL=$APP_BASE_URL" >> .env
          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env
          echo "VITE_APP_VERSION=$VITE_APP_VERSION" >> .env
          echo "VITE_LEGACY_APP_BASE_URL=$VITE_LEGACY_APP_BASE_URL" >> .env
          echo "TEST_API_URL=$TEST_API_URL" >> .env
          echo "TEST_APP_URL=$TEST_APP_URL" >> .env
          echo "TEST_EMAIL_PROVIDER=$TEST_EMAIL_PROVIDER" >> .env
          echo "TEST_USER_ADMIN_EMAIL=$TEST_USER_ADMIN_EMAIL" >> .env
          echo "TEST_USER_ADMIN_PASSWORD=$TEST_USER_ADMIN_PASSWORD" >> .env
          echo "TEST_USER_STATIC_EMAIL=$TEST_USER_STATIC_EMAIL" >> .env
          echo "TEST_USER_STATIC_PASSWORD=$TEST_USER_STATIC_PASSWORD" >> .env
          echo "ENABLE_REGISTRATION=true" >> .env
          echo "CSRF_COOKIE_DOMAIN=math3d.localdev" >> .env
          echo "DISABLE_ALLAUTH_RATE_LIMITS=true" >> .env
      - name: Build docker stack
        run: docker compose build
      - name: Migrate backend database
        run: docker compose run --rm webserver uv run ./manage.py migrate
      - name: Seed database
        run: docker compose run --rm webserver uv run ./manage.py seed_test_data
      - name: Start docker stack
        run: docker compose up -d
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build Frontend
        run: yarn build
      # The frontend is served by Playwright's webServer config (`yarn preview`
      # in CI), which waits for the URL to be ready before running tests.
      - name: Install Playwright Browsers
        run: yarn workspace app-tests-e2e playwright install --with-deps
      - name: Run Playwright tests
        run: yarn test-e2e
        env:
          CI: True
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app-tests-e2e/playwright-report/
          retention-days: 30
